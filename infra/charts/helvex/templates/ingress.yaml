{{- if .Values.ingress.enabled }}
{{- if .Values.ingress.tls }}
# Redirect HTTP → HTTPS via a Traefik Middleware + a separate Ingress on the web entrypoint
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "helvex.fullname" . }}-redirect-https
  namespace: {{ .Release.Namespace }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "helvex.fullname" . }}-http-redirect
  namespace: {{ .Release.Namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ include "helvex.fullname" . }}-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "helvex.fullname" . }}-frontend
                port:
                  number: 3000
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "helvex.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helvex.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: traefik
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecret | default (printf "%s-tls" (include "helvex.fullname" .)) }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # FastAPI: API, auth, docs, static assets, health
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "helvex.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: {{ include "helvex.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
          - path: /logout
            pathType: Prefix
            backend:
              service:
                name: {{ include "helvex.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: {{ include "helvex.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: {{ include "helvex.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: {{ include "helvex.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
          # Next.js frontend (everything else)
          - path: /
            pathType: Prefix
            backend:
              service:
                {{- if .Values.frontend.enabled }}
                name: {{ include "helvex.fullname" . }}-frontend
                port:
                  number: 3000
                {{- else }}
                name: {{ include "helvex.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
                {{- end }}
{{- end }}
