apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: helvex-web
  labels:
    {{- include "helvex.labels" . | nindent 4 }}
value: 1000
globalDefault: false
description: "Web-facing pods (app, frontend). Evicted last."
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: helvex-worker
  labels:
    {{- include "helvex.labels" . | nindent 4 }}
value: 100
globalDefault: false
description: "Background job worker. Evicted before web pods under memory pressure."
