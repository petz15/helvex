{{- if .Values.postgres.enabled }}
# Stable alias used as the DB_URL hostname — switches between direct and pooler
# without requiring a secret rotation.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "helvex.fullname" . }}-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helvex.labels" . | nindent 4 }}
spec:
  type: ExternalName
  {{- if .Values.postgres.pooler.enabled }}
  externalName: {{ include "helvex.fullname" . }}-pg-pooler.{{ .Release.Namespace }}.svc.cluster.local
  {{- else }}
  externalName: {{ include "helvex.fullname" . }}-pg-rw.{{ .Release.Namespace }}.svc.cluster.local
  {{- end }}
---
{{- if .Values.postgres.pooler.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: {{ include "helvex.fullname" . }}-pg-pooler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helvex.labels" . | nindent 4 }}
spec:
  cluster:
    name: {{ include "helvex.fullname" . }}-pg
  instances: 1
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "{{ .Values.postgres.pooler.maxClientConn }}"
      default_pool_size: "{{ .Values.postgres.pooler.defaultPoolSize }}"
{{- end }}
{{- end }}
