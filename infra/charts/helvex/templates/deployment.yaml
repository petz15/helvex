apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helvex.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helvex.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "helvex.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "helvex.labels" . | nindent 8 }}
        app.kubernetes.io/component: app
    spec:
      priorityClassName: helvex-web
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- if .Values.worker.enabled }}
            - name: DISABLE_JOB_WORKER
              value: "true"
            - name: USE_RQ
              value: "true"
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.envSecretName }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30   # up to 5 min for migrations before giving up
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
