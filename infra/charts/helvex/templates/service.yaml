apiVersion: v1
kind: Service
metadata:
  name: {{ include "helvex.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helvex.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
  selector:
    {{- include "helvex.selectorLabels" . | nindent 4 }}
