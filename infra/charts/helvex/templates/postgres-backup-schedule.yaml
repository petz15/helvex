{{- if and .Values.postgres.enabled .Values.postgres.backupEnabled }}
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ include "helvex.fullname" . }}-pg-backup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helvex.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.postgres.backupSchedule | quote }}
  backupOwnerReference: self
  cluster:
    name: {{ include "helvex.fullname" . }}-pg
{{- end }}
