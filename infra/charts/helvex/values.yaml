# Default values — overridden by infra/environments/{dev,prod}.yaml

image:
  repository: localhost:5000/helvex-app
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  port: 8000

frontend:
  enabled: true
  image:
    repository: localhost:5000/helvex-frontend
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  host: helvex.dicy.ch
  tls: false
  tlsSecret: ""
  annotations: {}

# Name of the K8s Secret that holds all env vars (created via Doppler operator or manually)
envSecretName: helvex-env

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# GHCR pull secret — set in prod.yaml; leave empty for dev (local registry needs no auth)
imagePullSecrets: []

# RQ job worker — separate Deployment running app/worker_entrypoint.py
worker:
  enabled: false   # set to true in prod when USE_RQ=true
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# CloudNativePG PostgreSQL cluster
postgres:
  enabled: false   # set to true in prod once CloudNativePG operator is installed
  instances: 2
  storageSize: 20Gi
  database: helvex
  owner: helvex
  backupEnabled: false
  restoreFromBackup: false   # set to true on rebuild to restore from S3 instead of initdb
  s3EndpointUrl: ""    # e.g. https://fsn1.your-objectstorage.com
  s3BucketPath: ""     # e.g. s3://helvex-backups/pg/
  backupSchedule: "0 0 2 * * *"  # 6-field cron (sec min hour day month weekday) for CNPG ScheduledBackup
  backupRetention: "7d"
  backupDataCompression: ""    # optional: "gzip" to compress base backups
  backupWalCompression: ""     # optional: "gzip" to compress archived WAL
  weeklyExport:
    enabled: false
    schedule: "30 3 * * 0"      # weekly (UTC)
    retentionDays: 60
    pgDumpImage: "postgres:16-alpine"
    pgDumpCompress: 9
    uploadImage: "rclone/rclone:1.66.0"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  pooler:
    enabled: false
    maxClientConn: 200
    defaultPoolSize: 20


monitoring:
  enabled: false
