# Default values — overridden by infra/environments/{dev,prod}.yaml

image:
  repository: localhost:5000/helvex-app
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  port: 8000

frontend:
  enabled: true
  image:
    repository: localhost:5000/helvex-frontend
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  host: helvex.dicy.ch
  tls: false
  tlsSecret: ""
  annotations: {}

# Name of the K8s Secret that holds all env vars (created via Doppler operator or manually)
envSecretName: helvex-env

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# GHCR pull secret — set in prod.yaml; leave empty for dev (local registry needs no auth)
imagePullSecrets: []

# CloudNativePG PostgreSQL cluster
postgres:
  enabled: false   # set to true in prod once CloudNativePG operator is installed
  instances: 2
  storageSize: 20Gi
  database: helvex
  owner: helvex
  backupEnabled: false
  s3EndpointUrl: ""    # e.g. https://fsn1.your-objectstorage.com
  s3BucketPath: ""     # e.g. s3://helvex-backups/pg/
  backupRetention: "7d"
