# kube-prometheus-stack — minimal footprint for single-node K3s
# Philosophy: scrape app + node metrics, view in Grafana, no alerting overhead.

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 7d
    # Scrape ServiceMonitors / PodMonitors from all namespaces
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    # Strip down default recording/alerting rules to save memory
    ruleSelectorNilUsesHelmValues: false
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  adminPassword: ""  # overridden per environment
  # No persistent volume — dashboards are code, data is in Prometheus
  persistence:
    enabled: false
  defaultDashboardsEnabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  grafana.ini:
    server:
      root_url: ""  # set per environment
    analytics:
      reporting_enabled: false
      check_for_updates: false
    # Disable unused Grafana features
    alerting:
      enabled: false
    unified_alerting:
      enabled: false

# ── AlertManager — disabled (no on-call setup yet) ───────────────────────────
alertmanager:
  enabled: false

# ── Disable control-plane components not exposed on K3s ──────────────────────
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false

# ── node-exporter — keep, very lightweight (~10Mi RAM) ───────────────────────
nodeExporter:
  enabled: true

# ── kube-state-metrics — keep, lightweight, gives pod/deployment metrics ─────
kubeStateMetrics:
  enabled: true

# ── Operator resource limits ──────────────────────────────────────────────────
prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
