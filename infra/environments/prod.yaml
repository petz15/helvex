# Prod environment — Hetzner K3s
image:
  repository: ghcr.io/petz15/helvex
  tag: latest
  pullPolicy: Always

replicaCount: 1

frontend:
  image:
    repository: ghcr.io/petz15/helvex-frontend
    tag: latest
    pullPolicy: Always

ingress:
  host: helvex.dicy.ch
  tls: true
  tlsSecret: helvex-tls
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod

resources:
  requests:
    cpu: 1000m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 3Gi

imagePullSecrets:
  - name: ghcr-pull-secret

worker:
  enabled: true

postgres:
  enabled: true
  instances: 1
  storageSize: 40Gi
  backupEnabled: true
  s3EndpointUrl: "https://nbg1.your-objectstorage.com"
  s3BucketPath: "s3://helvex-backups/pg-prod/"
  backupSchedule: "0 0 2 * * *"
  backupRetention: "7d"  # 7-day PITR window
  backupDataCompression: "gzip"
  backupWalCompression: "gzip"
  weeklyExport:
    enabled: true
    schedule: "30 3 * * 0"   # weekly export to Storage Box (UTC)
    retentionDays: 60
  pooler:
    enabled: false

monitoring:
  enabled: true
