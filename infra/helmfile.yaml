repositories:
  - name: jetstack
    url: https://charts.jetstack.io
  - name: cloudnative-pg
    url: https://cloudnative-pg.github.io/charts
  - name: arc
    url: https://actions-runner-controller.github.io/actions-runner-controller
  - name: arc-runners
    url: https://actions-runner-controller.github.io/actions-runner-controller
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

environments:
  dev:
    values:
      - environments/dev.yaml
  prod:
    values:
      - environments/prod.yaml

---

releases:
  # cert-manager — TLS certificate automation (Let's Encrypt)
  - name: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: "v1.15.0"
    createNamespace: true
    set:
      - name: crds.enabled
        value: "true"

  # CloudNativePG operator — K8s-native PostgreSQL
  - name: cloudnative-pg
    namespace: cnpg-system
    chart: cloudnative-pg/cloudnative-pg
    version: "0.22.0"
    createNamespace: true

  # ARC — Actions Runner Controller (ephemeral self-hosted runners as K8s pods)
  - name: arc-controller
    namespace: arc-systems
    chart: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller
    version: "0.9.3"
    createNamespace: true

  - name: arc-rbac
    namespace: arc-systems
    chart: ./charts/arc-rbac
    needs:
      - arc-systems/arc-controller

  - name: arc-runner-set
    namespace: arc-systems
    chart: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set
    version: "0.9.3"
    needs:
      - arc-systems/arc-controller
      - arc-systems/arc-rbac
    values:
      - githubConfigUrl: "https://github.com/petz15/helvex"
        githubConfigSecret: arc-github-app
        runnerScaleSetName: helvex-prod
        minRunners: 0
        maxRunners: 3
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-controller-gha-rs-controller
        template:
          spec:
            serviceAccountName: arc-runner

  # Prometheus + Grafana monitoring stack
  # disableValidation: CRDs (ServiceMonitor, PrometheusRule, etc.) don't exist on a
  # fresh cluster — skip server-side validation so helm diff doesn't fail before install.
  - name: monitoring
    namespace: monitoring
    chart: prometheus-community/kube-prometheus-stack
    version: "58.7.2"
    createNamespace: true
    disableValidation: true
    values:
      - ./charts/monitoring/values.yaml
      - environments/monitoring-{{ .Environment.Name }}.yaml

  # Main application
  - name: helvex
    namespace: helvex-{{ .Environment.Name }}
    chart: ./charts/helvex
    createNamespace: true
    # disableValidation: ServiceMonitor CRD is provided by monitoring; skip validation
    # when CRDs aren't installed yet (fresh cluster or monitoring not yet deployed).
    disableValidation: true
    needs:
      - cert-manager/cert-manager
      - cnpg-system/cloudnative-pg
      - monitoring/monitoring
    values:
      - ./charts/helvex/values.yaml
      - environments/{{ .Environment.Name }}.yaml
