repositories:
  - name: jetstack
    url: https://charts.jetstack.io
  - name: cloudnative-pg
    url: https://cloudnative-pg.github.io/charts
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: arc
    url: https://actions-runner-controller.github.io/actions-runner-controller
  - name: arc-runners
    url: https://actions-runner-controller.github.io/actions-runner-controller

environments:
  dev:
    values:
      - environments/dev.yaml
  prod:
    values:
      - environments/prod.yaml

---

releases:
  # cert-manager — TLS certificate automation (Let's Encrypt)
  - name: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: "v1.15.0"
    createNamespace: true
    set:
      - name: crds.enabled
        value: "true"

  # CloudNativePG operator — K8s-native PostgreSQL
  - name: cloudnative-pg
    namespace: cnpg-system
    chart: cloudnative-pg/cloudnative-pg
    version: "0.22.0"
    createNamespace: true

  # Redis — job queue backing store
  - name: redis
    namespace: helvex-{{ .Environment.Name }}
    chart: bitnami/redis
    version: "20.6.2"
    createNamespace: true
    values:
      - architecture: standalone
        image:
          registry: ghcr.io
        auth:
          enabled: true
          existingSecret: helvex-env
          existingSecretPasswordKey: REDIS_PASSWORD
        master:
          persistence:
            size: 10Gi
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

  # ARC — Actions Runner Controller (ephemeral self-hosted runners as K8s pods)
  - name: arc-controller
    namespace: arc-systems
    chart: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller
    version: "0.9.3"
    createNamespace: true

  - name: arc-rbac
    namespace: arc-systems
    chart: ./charts/arc-rbac
    needs:
      - arc-systems/arc-controller

  - name: arc-runner-set
    namespace: arc-systems
    chart: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set
    version: "0.9.3"
    needs:
      - arc-systems/arc-controller
      - arc-systems/arc-rbac
    values:
      - githubConfigUrl: "https://github.com/petz15/helvex"
        githubConfigSecret: arc-github-app
        runnerScaleSetName: helvex-prod
        minRunners: 0
        maxRunners: 3
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-controller-gha-rs-controller
        template:
          spec:
            serviceAccountName: arc-runner

  # Main application
  - name: helvex
    namespace: helvex-{{ .Environment.Name }}
    chart: ./charts/helvex
    createNamespace: true
    needs:
      - cert-manager/cert-manager
      - cnpg-system/cloudnative-pg
    values:
      - ./charts/helvex/values.yaml
      - environments/{{ .Environment.Name }}.yaml
