name: Deploy Prod

on:
  push:
    branches: ['**']

jobs:
  build:
    if: |
      contains(github.event.head_commit.message, '[deploy-prod]') ||
      contains(github.event.head_commit.message, '[deploy-app]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BUILD_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        continue-on-error: true
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}-frontend:latest
            ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}
          build-args: |
            FASTAPI_URL=http://helvex:8000
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    needs: build
    if: |
      contains(github.event.head_commit.message, '[deploy-prod]') ||
      contains(github.event.head_commit.message, '[deploy-app]')
    runs-on: helvex-prod
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup tools
        run: |
          # kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/kubectl
          # helm
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          # helmfile
          HELMFILE_VERSION=0.171.0
          curl -Lo /tmp/helmfile.tar.gz https://github.com/helmfile/helmfile/releases/download/v${HELMFILE_VERSION}/helmfile_${HELMFILE_VERSION}_linux_amd64.tar.gz
          tar -xzf /tmp/helmfile.tar.gz -C /tmp && sudo mv /tmp/helmfile /usr/local/bin/helmfile
          # helm-diff plugin
          helm plugin install https://github.com/databus23/helm-diff

      - name: Verify cluster access
        run: kubectl get nodes -o wide

      - name: Ensure K8s secrets exist
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          REGISTRY_USER: ${{ github.actor }}
        run: |
          if ! kubectl get secret helvex-env -n helvex-prod &>/dev/null; then
            kubectl create secret generic helvex-env \
              --from-literal=DATABASE_URL="${{ secrets.DB_URL }}" \
              --from-literal=REDIS_URL="${{ secrets.REDIS_URL }}" \
              --from-literal=REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
              --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              --from-literal=S3_ACCESS_KEY="${{ secrets.S3_ACCESS_KEY }}" \
              --from-literal=S3_SECRET_KEY="${{ secrets.S3_SECRET_KEY }}" \
              --from-literal=SMTP_HOST="${{ secrets.SMTP_HOST }}" \
              --from-literal=SMTP_PORT="${{ secrets.SMTP_PORT }}" \
              --from-literal=SMTP_USER="${{ secrets.SMTP_USER }}" \
              --from-literal=SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
              --from-literal=SMTP_FROM="${{ secrets.SMTP_FROM }}" \
              --from-literal=APP_BASE_URL="https://helvex.dicy.ch" \
              --from-literal=USE_RQ="true" \
              --from-literal=username="helvex" \
              --from-literal=password="${{ secrets.DB_PASSWORD }}" \
              -n helvex-prod
          fi
          if ! kubectl get secret ghcr-pull-secret -n helvex-prod &>/dev/null; then
            if [ -z "$GHCR_PAT" ]; then
              echo "ERROR: GHCR_PAT secret is not set in GitHub repo settings" >&2
              exit 1
            fi
            kubectl create secret docker-registry ghcr-pull-secret \
              --docker-server=ghcr.io \
              --docker-username="$REGISTRY_USER" \
              --docker-password="$GHCR_PAT" \
              -n helvex-prod
          fi
          if ! kubectl get secret arc-github-app -n arc-systems &>/dev/null; then
            kubectl create namespace arc-systems --dry-run=client -o yaml | kubectl apply -f -
            kubectl create secret generic arc-github-app \
              --from-literal=github_app_id="${{ secrets.ARC_APP_ID }}" \
              --from-literal=github_app_installation_id="${{ secrets.ARC_APP_INSTALLATION_ID }}" \
              --from-literal=github_app_private_key="${{ secrets.ARC_APP_PRIVATE_KEY }}" \
              -n arc-systems
          fi

      - name: Bootstrap CRDs (cert-manager + CloudNativePG)
        if: contains(github.event.head_commit.message, '[deploy-prod]')
        working-directory: infra
        run: |
          helmfile -e prod apply --selector name=cert-manager --suppress-diff
          helmfile -e prod apply --selector name=cloudnative-pg --suppress-diff
          kubectl wait --for condition=established --timeout=60s crd/clusters.postgresql.cnpg.io
          kubectl wait --for condition=established --timeout=60s crd/clusterissuers.cert-manager.io

      - name: Apply Helmfile (prod)
        working-directory: infra
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          SELECTOR=""
          if echo "$COMMIT_MSG" | grep -qF '[deploy-app]'; then
            SELECTOR="--selector name=helvex"
          fi
          helmfile -e prod apply $SELECTOR \
            --set "image.tag=${{ github.sha }}" \
            --set "frontend.image.tag=${{ github.sha }}" \
            --suppress-diff

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/helvex -n helvex-prod --timeout=180s
          kubectl rollout status deployment/helvex-frontend -n helvex-prod --timeout=180s

      - name: Bump minor version
        run: |
          latest=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          latest=${latest:-v0.0.0}
          major=$(echo "$latest" | cut -d. -f1 | tr -d 'v')
          minor=$(echo "$latest" | cut -d. -f2)
          new_tag="v${major}.$((minor + 1)).0"
          echo "Bumping $latest → $new_tag"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$new_tag" -m "Release $new_tag"
          git push origin "$new_tag"
