name: Deploy Prod

# Manual trigger only — or triggered by a git tag (v*)
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (git SHA or 'latest')"
        required: true
        default: latest
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: self-hosted-prod   # GitHub Actions runner on the Hetzner control-plane node
    environment: production     # requires manual approval in GitHub
    steps:
      - uses: actions/checkout@v4

      - name: Prepare kubeconfig
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          if [ -r /etc/rancher/k3s/k3s.yaml ]; then
            cp /etc/rancher/k3s/k3s.yaml "$HOME/.kube/config"
            chmod 600 "$HOME/.kube/config"
          else
            echo "ERROR: Cannot read /etc/rancher/k3s/k3s.yaml" >&2
            echo "Ensure the runner user is in the k3s group:" >&2
            echo "  sudo usermod -aG k3s <runner-user>" >&2
            exit 1
          fi
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Verify cluster access
        run: kubectl get nodes -o wide

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply Helmfile (prod)
        working-directory: infra
        run: |
          helmfile -e prod apply \
            --set "image.tag=${{ steps.tag.outputs.tag }}" \
            --set "frontend.image.tag=${{ steps.tag.outputs.tag }}" \
            --suppress-diff

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/helvex -n helvex-prod --timeout=180s
          kubectl rollout status deployment/helvex-frontend -n helvex-prod --timeout=180s
