name: Deploy Dev

# Runs on the self-hosted runner installed on the dev K3s server.
# The runner already has kubectl + helmfile configured.
on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted   # runner on the LAN dev server
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag and push backend
        run: |
          docker pull ghcr.io/${{ github.repository }}:${{ github.event.workflow_run.head_sha }}
          docker tag  ghcr.io/${{ github.repository }}:${{ github.event.workflow_run.head_sha }} 192.168.1.100:5000/helvex-app:latest
          docker push 192.168.1.100:5000/helvex-app:latest

      - name: Retag and push frontend
        run: |
          docker pull ghcr.io/${{ github.repository }}-frontend:${{ github.event.workflow_run.head_sha }}
          docker tag  ghcr.io/${{ github.repository }}-frontend:${{ github.event.workflow_run.head_sha }} 192.168.1.100:5000/helvex-frontend:latest
          docker push 192.168.1.100:5000/helvex-frontend:latest

      - name: Apply Helmfile (dev)
        working-directory: infra
        run: helmfile -e dev apply --suppress-diff
