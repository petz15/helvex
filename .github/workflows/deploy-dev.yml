name: Deploy Dev

# Runs on the self-hosted runner installed on the dev K3s server.
# The runner already has kubectl + helmfile configured.
on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted   # runner on the LAN dev server
    steps:
      - uses: actions/checkout@v4

      - name: Update image tag in dev values
        run: |
          sed -i "s|tag: .*|tag: ${{ github.event.workflow_run.head_sha }}|" \
            infra/environments/dev.yaml

      - name: Apply Helmfile (dev)
        working-directory: infra
        run: helmfile -e dev apply --suppress-diff
