name: Deploy Dev

# Runs on the self-hosted runner installed on the dev K3s server.
# The runner already has kubectl + helmfile configured.
on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted   # runner on the LAN dev server
    steps:
      - uses: actions/checkout@v5

      - name: Prepare kubeconfig for runner user
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"

          if [ -r /etc/rancher/k3s/k3s.yaml ]; then
            cp /etc/rancher/k3s/k3s.yaml "$HOME/.kube/config"
          else
            sudo install -m 600 /etc/rancher/k3s/k3s.yaml "$HOME/.kube/config"
            sudo chown "$(id -u):$(id -g)" "$HOME/.kube/config"
          fi

          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Verify cluster access
        run: kubectl get nodes -o wide

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag and push backend
        run: |
          docker pull ghcr.io/${{ github.repository }}:${{ github.event.workflow_run.head_sha }}
          docker tag  ghcr.io/${{ github.repository }}:${{ github.event.workflow_run.head_sha }} 192.168.1.100:5000/helvex-app:latest
          docker push 192.168.1.100:5000/helvex-app:latest

      - name: Retag and push frontend
        run: |
          docker pull ghcr.io/${{ github.repository }}-frontend:${{ github.event.workflow_run.head_sha }}
          docker tag  ghcr.io/${{ github.repository }}-frontend:${{ github.event.workflow_run.head_sha }} 192.168.1.100:5000/helvex-frontend:latest
          docker push 192.168.1.100:5000/helvex-frontend:latest

      - name: Apply Helmfile (dev)
        working-directory: infra
        run: helmfile -e dev apply --suppress-diff

      - name: Restart pods to pick up new images
        run: |
          kubectl rollout restart deployment/helvex -n helvex-dev
          kubectl rollout restart deployment/helvex-frontend -n helvex-dev
          kubectl rollout status deployment/helvex -n helvex-dev --timeout=120s
          kubectl rollout status deployment/helvex-frontend -n helvex-dev --timeout=120s
