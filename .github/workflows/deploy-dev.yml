name: Deploy Dev

on:
  push:
    tags:
      - 'deploy-dev'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}:dev
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}-frontend:dev
            ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}
          build-args: |
            FASTAPI_URL=http://helvex:8000
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Prepare kubeconfig
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          if [ -r /etc/rancher/k3s/k3s.yaml ]; then
            cp /etc/rancher/k3s/k3s.yaml "$HOME/.kube/config"
            chmod 600 "$HOME/.kube/config"
          else
            echo "ERROR: Runner user cannot read /etc/rancher/k3s/k3s.yaml" >&2
            echo "Run: sudo usermod -aG k3s <runner-user>" >&2
            exit 1
          fi
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Verify cluster access
        run: kubectl get nodes -o wide

      - name: Bootstrap CRDs (cert-manager + CloudNativePG)
        working-directory: infra
        run: |
          helmfile -e dev apply --selector name=cert-manager --suppress-diff
          helmfile -e dev apply --selector name=cloudnative-pg --suppress-diff
          kubectl wait --for condition=established --timeout=60s crd/clusters.postgresql.cnpg.io
          kubectl wait --for condition=established --timeout=60s crd/clusterissuers.cert-manager.io

      - name: Apply Helmfile (dev)
        working-directory: infra
        run: |
          helmfile -e dev apply \
            --set "image.tag=${{ github.sha }}" \
            --set "frontend.image.tag=${{ github.sha }}" \
            --suppress-diff

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/helvex -n helvex-dev --timeout=120s
          kubectl rollout status deployment/helvex-frontend -n helvex-dev --timeout=120s
