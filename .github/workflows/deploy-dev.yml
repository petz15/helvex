name: Deploy Dev

on:
  push:
    branches: ['**']

jobs:
  build:
    if: contains(github.event.head_commit.message, '[deploy-dev]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}:dev
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}-frontend:dev
            ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}
          build-args: |
            FASTAPI_URL=http://helvex:8000
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    needs: build
    if: contains(github.event.head_commit.message, '[deploy-dev]')
    runs-on: helvex-dev
    steps:
      - uses: actions/checkout@v5

      - name: Prepare kubeconfig
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          if [ -r /etc/rancher/k3s/k3s.yaml ]; then
            cp /etc/rancher/k3s/k3s.yaml "$HOME/.kube/config"
            chmod 600 "$HOME/.kube/config"
          else
            echo "ERROR: Runner user cannot read /etc/rancher/k3s/k3s.yaml" >&2
            echo "Run: sudo usermod -aG k3s <runner-user>" >&2
            exit 1
          fi
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Verify cluster access
        run: kubectl get nodes -o wide

      - name: Ensure K8s secrets exist
        run: |
          if ! kubectl get secret helvex-env -n helvex-dev &>/dev/null; then
            kubectl create namespace helvex-dev --dry-run=client -o yaml | kubectl apply -f -
            kubectl create secret generic helvex-env \
              --from-literal=DATABASE_URL="${{ secrets.DB_URL }}" \
              --from-literal=REDIS_URL="${{ secrets.REDIS_URL }}" \
              --from-literal=REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
              --from-literal=SERPER_API_KEY="${{ secrets.SERPER_API_KEY }}" \
              --from-literal=ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
              --from-literal=ZEFIX_API_USERNAME="${{ secrets.ZEFIX_API_USERNAME }}" \
              --from-literal=ZEFIX_API_PASSWORD="${{ secrets.ZEFIX_API_PASSWORD }}" \
              --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              --from-literal=S3_ACCESS_KEY="${{ secrets.S3_ACCESS_KEY }}" \
              --from-literal=S3_SECRET_KEY="${{ secrets.S3_SECRET_KEY }}" \
              --from-literal=STORAGEBOX_HOST="${{ secrets.STORAGEBOX_HOST }}" \
              --from-literal=STORAGEBOX_USER="${{ secrets.STORAGEBOX_USER }}" \
              --from-literal=STORAGEBOX_PATH="${{ secrets.STORAGEBOX_PATH }}" \
              --from-literal=STORAGEBOX_PORT="${{ secrets.STORAGEBOX_PORT }}" \
              --from-literal=STORAGEBOX_SSH_PRIVATE_KEY="${{ secrets.STORAGEBOX_SSH_PRIVATE_KEY }}" \
              --from-literal=username="helvex" \
              --from-literal=password="${{ secrets.DB_PASSWORD }}" \
              -n helvex-dev
          fi
          if ! kubectl get secret ghcr-pull-secret -n helvex-dev &>/dev/null; then
            kubectl create secret docker-registry ghcr-pull-secret \
              --docker-server=ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${{ secrets.GHCR_PAT }} \
              -n helvex-dev
          fi

      - name: Bootstrap CRDs (cert-manager + CloudNativePG)
        working-directory: infra
        run: |
          helmfile -e dev apply --selector name=cert-manager --suppress-diff
          helmfile -e dev apply --selector name=cloudnative-pg --suppress-diff
          kubectl wait --for condition=established --timeout=60s crd/clusters.postgresql.cnpg.io
          kubectl wait --for condition=established --timeout=60s crd/clusterissuers.cert-manager.io

      - name: Apply Helmfile (dev)
        working-directory: infra
        run: |
          helmfile -e dev apply \
            --set "image.tag=${{ github.sha }}" \
            --set "frontend.image.tag=${{ github.sha }}" \
            --suppress-diff

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/helvex -n helvex-dev --timeout=120s
          kubectl rollout status deployment/helvex-frontend -n helvex-dev --timeout=120s
